<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- Cấu hình viewport chuẩn cho ứng dụng di động/POS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Scanner - CCCD & MRZ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Thư viện quét QR -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <!-- Thư viện OCR (Nhận diện chữ cái) cho MRZ -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        /* Tùy chỉnh UI */
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .tab-inactive { color: #6b7280; }
        
        /* Container Camera */
        .camera-container { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; min-height: 250px;}
        #qr-reader, #mrz-video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Khung định vị MRZ */
        #mrz-overlay {
            position: absolute;
            bottom: 10%;
            left: 5%;
            width: 90%;
            height: 25%;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 4px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); /* Làm tối xung quanh */
            z-index: 10;
            display: none;
            pointer-events: none;
        }
        #mrz-overlay::after {
            content: "Căn 2 dòng MRZ vào khung này";
            position: absolute;
            top: -25px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 12px;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-white shadow-sm z-20">
        <div class="bg-blue-600 text-white p-3 text-center">
            <h1 class="text-lg font-bold">Smart POS Scanner</h1>
        </div>
        <!-- Tabs -->
        <div class="flex justify-between border-b bg-white">
            <button id="tab-qr" class="flex-1 py-3 tab-active text-sm uppercase tracking-wide transition">Quét CCCD/VNeID</button>
            <button id="tab-mrz" class="flex-1 py-3 tab-inactive text-sm uppercase tracking-wide transition border-l">Quét Hộ Chiếu</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 flex flex-col overflow-y-auto">
        
        <!-- Khung hiển thị Camera chung -->
        <div class="w-full bg-white rounded-xl shadow-md p-3 mb-4">
            <div class="camera-container flex items-center justify-center">
                <!-- Vùng cho QR -->
                <div id="qr-reader" class="w-full h-full absolute inset-0"></div>
                
                <!-- Vùng cho MRZ -->
                <video id="mrz-video" class="absolute inset-0 hidden" autoplay playsinline></video>
                <div id="mrz-overlay"></div>
                
                <!-- Hiệu ứng tải/Loading -->
                <div id="loading-indicator" class="absolute z-30 text-white text-sm text-center px-4 hidden">
                    <svg class="animate-spin h-8 w-8 text-white mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="loading-text">Đang chuẩn bị Camera...</span>
                </div>
            </div>

            <!-- Nút điều khiển -->
            <div class="mt-4">
                <button id="btn-action" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition">
                    Bắt đầu Quét QR
                </button>
            </div>
        </div>

        <!-- Canvas ẩn dùng để xử lý ảnh cắt MRZ trước khi OCR -->
        <canvas id="mrz-canvas" class="hidden"></canvas>

        <!-- Khu vực hiển thị kết quả -->
        <div class="w-full bg-white rounded-xl shadow-md p-4 flex-grow mb-4">
            <div class="flex justify-between items-center border-b pb-2 mb-3">
                <h2 class="text-md font-bold text-gray-700">Dữ liệu trích xuất:</h2>
                <button id="btn-clear" class="text-xs bg-gray-200 px-2 py-1 rounded text-gray-600 hidden">Xóa</button>
            </div>
            
            <!-- Kết quả QR (CCCD) -->
            <div id="result-qr" class="text-sm space-y-2 hidden">
                <p><strong>Số CCCD:</strong> <span id="r-cccd" class="text-blue-600 font-bold"></span></p>
                <p><strong>Họ và tên:</strong> <span id="r-name" class="uppercase font-bold text-gray-900"></span></p>
                <p><strong>Ngày sinh:</strong> <span id="r-dob"></span></p>
                <p><strong>Giới tính:</strong> <span id="r-gender"></span></p>
                <p><strong>Địa chỉ:</strong> <span id="r-address"></span></p>
            </div>

            <!-- Kết quả MRZ (Hộ chiếu) -->
            <div id="result-mrz" class="text-sm space-y-2 hidden">
                <p><strong>Số Hộ Chiếu:</strong> <span id="m-passport" class="text-red-600 font-bold text-lg"></span></p>
                <p><strong>Họ và Tên:</strong> <span id="m-name" class="uppercase font-bold text-gray-900"></span></p>
                <p><strong>Quốc tịch:</strong> <span id="m-nation"></span></p>
                <p><strong>Ngày sinh:</strong> <span id="m-dob"></span></p>
                <p><strong>Giới tính:</strong> <span id="m-gender"></span></p>
                <p><strong>Ngày hết hạn:</strong> <span id="m-expire"></span></p>
            </div>

            <!-- Dữ liệu thô / Log -->
            <div class="mt-4 p-2 bg-gray-50 rounded border text-xs text-gray-500 font-mono break-words min-h-[50px]" id="raw-log">
                Vui lòng bấm nút bắt đầu và đưa giấy tờ vào khung hình...
            </div>
        </div>
    </main>

    <script>
        // -- QUẢN LÝ TRẠNG THÁI --
        let currentMode = 'QR'; // 'QR' hoặc 'MRZ'
        let isScanning = false;
        
        // QR Variables
        let html5QrCode = null;

        // MRZ Variables
        let videoStream = null;
        let mrzInterval = null;
        let ocrWorker = null;
        let isOcrReady = false;

        // DOM Elements
        const ui = {
            tabQr: document.getElementById('tab-qr'),
            tabMrz: document.getElementById('tab-mrz'),
            btnAction: document.getElementById('btn-action'),
            btnClear: document.getElementById('btn-clear'),
            qrContainer: document.getElementById('qr-reader'),
            mrzVideo: document.getElementById('mrz-video'),
            mrzOverlay: document.getElementById('mrz-overlay'),
            loading: document.getElementById('loading-indicator'),
            loadingText: document.getElementById('loading-text'),
            log: document.getElementById('raw-log'),
            resQr: document.getElementById('result-qr'),
            resMrz: document.getElementById('result-mrz')
        };

        // -- LOGIC CHUYỂN TAB --
        ui.tabQr.addEventListener('click', () => switchTab('QR'));
        ui.tabMrz.addEventListener('click', () => switchTab('MRZ'));

        async function switchTab(mode) {
            if (isScanning) await stopCurrentScan();
            
            currentMode = mode;
            ui.btnAction.textContent = mode === 'QR' ? "Bắt đầu Quét CCCD" : "Bắt đầu Quét Hộ Chiếu";
            ui.btnAction.classList.remove('bg-red-500', 'hover:bg-red-600');
            ui.btnAction.classList.add('bg-blue-600', 'hover:bg-blue-700');
            
            ui.log.innerHTML = mode === 'QR' ? "Chế độ: Đọc mã vạch 2D siêu tốc." : "Chế độ: AI OCR đọc MRZ. Vui lòng căn đúng khung.";
            clearResults();

            if (mode === 'QR') {
                ui.tabQr.className = "flex-1 py-3 tab-active text-sm uppercase tracking-wide transition";
                ui.tabMrz.className = "flex-1 py-3 tab-inactive text-sm uppercase tracking-wide transition border-l";
                ui.qrContainer.style.display = 'block';
                ui.mrzVideo.classList.add('hidden');
                ui.mrzOverlay.style.display = 'none';
            } else {
                ui.tabMrz.className = "flex-1 py-3 tab-active text-sm uppercase tracking-wide transition border-l";
                ui.tabQr.className = "flex-1 py-3 tab-inactive text-sm uppercase tracking-wide transition";
                ui.qrContainer.style.display = 'none';
                ui.mrzVideo.classList.remove('hidden');
                ui.mrzOverlay.style.display = 'block';
                // Khởi tạo Tesseract nếu chưa có
                initTesseract();
            }
        }

        // -- NÚT ĐIỀU KHIỂN CHÍNH --
        ui.btnAction.addEventListener('click', async () => {
            if (isScanning) {
                await stopCurrentScan();
            } else {
                startCurrentScan();
            }
        });

        ui.btnClear.addEventListener('click', clearResults);

        function toggleActionBtn(scanning) {
            isScanning = scanning;
            if (scanning) {
                ui.btnAction.textContent = "Dừng Quét";
                ui.btnAction.classList.replace('bg-blue-600', 'bg-red-500');
                ui.btnAction.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');
            } else {
                ui.btnAction.textContent = currentMode === 'QR' ? "Bắt đầu Quét CCCD" : "Bắt đầu Quét Hộ Chiếu";
                ui.btnAction.classList.replace('bg-red-500', 'bg-blue-600');
                ui.btnAction.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
            }
        }

        function showLoading(show, text = "Đang xử lý...") {
            ui.loadingText.textContent = text;
            ui.loading.style.display = show ? 'block' : 'none';
        }

        function logMsg(msg, isError = false) {
            ui.log.innerHTML = `<span class="${isError ? 'text-red-500' : 'text-green-600'}">${msg}</span>`;
        }

        async function startQRScan() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");
            
            showLoading(true, "Đang mở camera QR...");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            try {
                // Thêm callback thứ 2 để bỏ qua các lỗi khung hình trống (không có mã QR)
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (decodedText) => {
                        // Quét thành công
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                        stopCurrentScan();
                        parseCCCD(decodedText);
                    },
                    (errorMessage) => {
                        // Bỏ qua lỗi ngầm để camera không bị đứng
                    }
                );
                showLoading(false);
                toggleActionBtn(true);
                logMsg("Đang tìm mã QR CCCD/VNeID...");
            } catch (err) {
                showLoading(false);
                logMsg("Lỗi Camera QR: " + err + "<br>Thử kiểm tra quyền truy cập Camera.", true);
            }
        }

        function parseCCCD(qrText) {
            const parts = qrText.split('|');
            ui.resMrz.classList.add('hidden');
            ui.resQr.classList.remove('hidden');
            ui.btnClear.classList.remove('hidden');

            if (parts.length >= 6) {
                document.getElementById('r-cccd').textContent = parts[0];
                document.getElementById('r-name').textContent = parts[2];
                // Format ngày sinh
                const dob = parts[3] || "";
                document.getElementById('r-dob').textContent = dob.length === 8 ? `${dob.slice(0,2)}/${dob.slice(2,4)}/${dob.slice(4,8)}` : dob;
                document.getElementById('r-gender').textContent = parts[4];
                document.getElementById('r-address').textContent = parts[5];
                
                logMsg(`<span class="text-green-600 font-bold text-base">✅ Quét CCCD thành công!</span>`);
            } else {
                logMsg(`⚠️ Đã quét QR, nhưng không phải CCCD.<br><span class="text-gray-500 break-all">${qrText}</span>`);
            }
        }

        async function initTesseract() {
            if (isOcrReady || ocrWorker != null) return;
            showLoading(true, "Đang tải Engine AI (Tesseract)...");
            logMsg("Đang tải dữ liệu mô hình OCR, vui lòng đợi...");
            
            try {
                ocrWorker = await Tesseract.createWorker('eng');
                await ocrWorker.setParameters({
                    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<', // MRZ chỉ có những ký tự này
                });
                isOcrReady = true;
                showLoading(false);
                logMsg("Engine AI đã sẵn sàng!");
            } catch (error) {
                showLoading(false);
                logMsg("Lỗi khởi tạo AI OCR: " + error.message, true);
            }
        }

        async function startMRZScan() {
            if (!isOcrReady) {
                alert("Hệ thống AI chưa tải xong, vui lòng đợi vài giây!");
                return;
            }
            showLoading(true, "Đang mở camera...");
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
                ui.mrzVideo.srcObject = videoStream;
                ui.mrzVideo.play();
                showLoading(false);
                toggleActionBtn(true);
                logMsg("Hãy đưa 2 dòng MRZ dưới cùng Hộ chiếu vào sát khung chữ nhật...");
                
                // Bắt đầu chu kỳ chụp ảnh và OCR (Mỗi 1.5 giây chụp 1 lần để máy POS không bị treo)
                mrzInterval = setInterval(captureAndRecognizeMRZ, 1500);
            } catch (err) {
                showLoading(false);
                logMsg("Lỗi mở camera: " + err, true);
            }
        }

        async function captureAndRecognizeMRZ() {
            if (!isScanning) return;

            const video = ui.mrzVideo;
            const canvas = document.getElementById('mrz-canvas');
            const ctx = canvas.getContext('2d');

            // Tính toán tọa độ để chỉ CẮT phần hình ảnh trong khung MRZ Overlay
            // Điều này giảm 80% khối lượng tính toán cho Tesseract
            const cropHeight = video.videoHeight * 0.25; // 25% chiều cao video (tương ứng với overlay)
            const cropY = video.videoHeight * 0.75;      // Bắt đầu từ đoạn 75% chiều cao
            const cropWidth = video.videoWidth * 0.9;
            const cropX = video.videoWidth * 0.05;

            canvas.width = cropWidth;
            canvas.height = cropHeight;
            
            // Vẽ phần cắt lên canvas
            ctx.drawImage(video, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
            
            // Xử lý ảnh: Chỉ chuyển sang trắng đen (Grayscale), bỏ tính năng Threshold cứng để giữ chi tiết chữ
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let brightness = (d[i] * 0.299) + (d[i+1] * 0.587) + (d[i+2] * 0.114);
                d[i] = d[i+1] = d[i+2] = brightness;
            }
            ctx.putImageData(imgData, 0, 0);

            ui.loadingText.textContent = "AI đang đọc chữ...";
            ui.loading.style.display = 'block';

            try {
                // Nhận diện chữ
                const { data: { text } } = await ocrWorker.recognize(canvas);
                
                // Phân tích văn bản thành chuẩn MRZ
                if (parseMRZText(text)) {
                    // Đọc thành công
                    if (navigator.vibrate) navigator.vibrate(300);
                    stopCurrentScan();
                }
            } catch (e) {
                console.error("Lỗi OCR:", e);
            } finally {
                if (isScanning) ui.loading.style.display = 'none';
            }
        }

        // Hàm trích xuất dữ liệu từ chuỗi MRZ lộn xộn
        function parseMRZText(text) {
            // In trực tiếp dữ liệu thô AI đọc được ra màn hình để bạn debug xem camera có bắt nét được không
            ui.log.innerHTML = `<strong class="text-blue-600">AI đang nhìn thấy:</strong><br><span class="text-gray-500 text-[10px] font-mono leading-tight uppercase block max-h-20 overflow-y-auto">${text.replace(/\n/g, '<br>')}</span>`;

            // Lọc ra các dòng có chứa nhiều ký tự MRZ hợp lệ và dấu <
            const lines = text.split('\n').map(l => l.replace(/\s/g, '').toUpperCase());
            
            // Tìm dòng bắt đầu bằng P (Passport) (nới lỏng độ dài > 35 ký tự thay vì ép buộc 44)
            let line1 = lines.find(l => l.startsWith('P') && l.length > 35);
            // Tìm dòng thứ 2 (chứa số, khác dòng 1)
            let line2 = lines.find(l => l !== line1 && l.length > 35 && /[0-9]/.test(l));

            if (line1 && line2) {
                // Sửa các lỗi OCR phổ biến: AI hay đọc dấu < thành chữ C, K hoặc ngoặc. 
                // Cắt và độn chuỗi cho đủ 44 ký tự chuẩn ICAO.
                line1 = line1.replace(/[CK\(\)\[\]\«\>]/g, '<').padEnd(44, '<').substring(0, 44);
                line2 = line2.replace(/[CK\(\)\[\]\«\>]/g, '<').padEnd(44, '<').substring(0, 44);

                try {
                    // Trích xuất theo chuẩn ICAO Document 9303 (TD3 format)
                    const nation = line1.substring(2, 5).replace(/</g, '');
                    const nameParts = line1.substring(5).split('<<');
                    const surName = nameParts[0].replace(/</g, ' ');
                    const givenName = nameParts[1] ? nameParts[1].replace(/</g, ' ') : '';
                    
                    const passportNo = line2.substring(0, 9).replace(/</g, '');
                    const nationality = line2.substring(10, 13).replace(/</g, '');
                    const dobRaw = line2.substring(13, 19); // YYMMDD
                    const gender = line2.substring(20, 21);
                    const expireRaw = line2.substring(21, 27); // YYMMDD

                    // Format ngày sinh (quy ước thế kỷ)
                    let dobYear = parseInt(dobRaw.substring(0,2));
                    dobYear += (dobYear > 30) ? 1900 : 2000;
                    const dob = `${dobRaw.substring(4,6)}/${dobRaw.substring(2,4)}/${dobYear}`;

                    // Format ngày hết hạn
                    let expYear = 2000 + parseInt(expireRaw.substring(0,2));
                    const expire = `${expireRaw.substring(4,6)}/${expireRaw.substring(2,4)}/${expYear}`;

                    // Hiển thị UI
                    ui.resQr.classList.add('hidden');
                    ui.resMrz.classList.remove('hidden');
                    ui.btnClear.classList.remove('hidden');

                    document.getElementById('m-passport').textContent = passportNo;
                    document.getElementById('m-name').textContent = `${surName} ${givenName}`.trim();
                    document.getElementById('m-nation').textContent = nationality || nation;
                    document.getElementById('m-dob').textContent = dob;
                    document.getElementById('m-gender').textContent = gender === 'M' ? 'Nam' : (gender === 'F' ? 'Nữ' : 'Khác');
                    document.getElementById('m-expire').textContent = expire;

                    logMsg(`<span class="text-green-600 font-bold text-base">✅ Quét Hộ chiếu thành công!</span><br><span class="text-xs text-gray-500">MRZ:<br>${line1}<br>${line2}</span>`);
                    return true;
                } catch (e) {
                    console.log("Sai định dạng parse MRZ", e);
                    return false;
                }
            }
            return false;
        }

        function startCurrentScan() {
            clearResults();
            if (currentMode === 'QR') {
                startQRScan();
            } else {
                startMRZScan();
            }
        }

        async function stopCurrentScan() {
            if (!isScanning) return;
            
            showLoading(false);
            if (currentMode === 'QR' && html5QrCode) {
                try {
                    await html5QrCode.stop();
                } catch (e) {}
            } else if (currentMode === 'MRZ') {
                clearInterval(mrzInterval);
                if (videoStream) {
                    videoStream.getTracks().forEach(track => track.stop());
                }
            }
            toggleActionBtn(false);
        }

        function clearResults() {
            ui.resQr.classList.add('hidden');
            ui.resMrz.classList.add('hidden');
            ui.btnClear.classList.add('hidden');
            
            // Xóa text QR
            ['r-cccd', 'r-name', 'r-dob', 'r-gender', 'r-address'].forEach(id => document.getElementById(id).textContent = '');
            // Xóa text MRZ
            ['m-passport', 'm-name', 'm-nation', 'm-dob', 'm-gender', 'm-expire'].forEach(id => document.getElementById(id).textContent = '');
        }

    </script>
</body>
</html>
