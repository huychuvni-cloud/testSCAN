<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Scanner - CCCD & MRZ (Snapshot)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
        .tab-inactive { color: #6b7280; }
        
        .camera-container { 
            position: relative; width: 100%; border-radius: 8px; 
            overflow: hidden; background: #111; min-height: 280px; 
            display: flex; align-items: center; justify-content: center;
        }
        #qr-reader { width: 100%; height: 100%; }
        #mrz-video { width: 100%; height: 100%; object-fit: cover; }
        #snapshot-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; z-index: 5; }
        
        /* Khung định vị MRZ chuyên nghiệp */
        .mrz-guide {
            position: absolute;
            bottom: 15%;
            width: 90%;
            height: 30%;
            border: 2px dashed #4ade80; /* Màu xanh lá nhạt */
            border-radius: 8px;
            z-index: 10;
            box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .mrz-guide-text {
            color: #4ade80;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans flex flex-col h-screen overflow-hidden">

    <header class="bg-white shadow-sm z-20">
        <div class="bg-blue-600 text-white p-3 text-center">
            <h1 class="text-lg font-bold">POS Scanner Pro</h1>
        </div>
        <div class="flex justify-between border-b bg-white">
            <button id="tab-qr" class="flex-1 py-3 tab-active text-sm uppercase tracking-wide">Quét CCCD/VNeID</button>
            <button id="tab-mrz" class="flex-1 py-3 tab-inactive text-sm uppercase tracking-wide border-l">Quét Hộ Chiếu</button>
        </div>
    </header>

    <main class="flex-grow p-4 flex flex-col overflow-y-auto">
        <div class="w-full bg-white rounded-xl shadow-md p-3 mb-4 relative">
            <div class="camera-container" id="camera-box">
                <!-- QR Mode -->
                <div id="qr-reader" class="absolute inset-0"></div>
                
                <!-- MRZ Mode -->
                <video id="mrz-video" class="absolute inset-0 hidden" autoplay playsinline></video>
                <canvas id="snapshot-canvas"></canvas> <!-- Hiển thị ảnh vừa chụp -->
                
                <div id="mrz-overlay" class="mrz-guide hidden">
                    <span class="mrz-guide-text">Căn 2 dòng chữ MRZ vào đây<br>rồi bấm CHỤP ẢNH</span>
                </div>

                <!-- Overlay Loading -->
                <div id="loading-indicator" class="absolute inset-0 bg-black bg-opacity-70 z-30 flex flex-col items-center justify-center hidden">
                    <svg class="animate-spin h-10 w-10 text-blue-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="loading-text" class="text-white font-bold text-center px-4">Đang xử lý AI OCR...</span>
                </div>
            </div>

            <!-- Nút điều khiển -->
            <div class="mt-4 flex gap-2">
                <button id="btn-action" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition">
                    Bắt đầu Mở Camera
                </button>
                <button id="btn-snapshot" class="hidden flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md transition">
                    📸 Chụp & Phân tích
                </button>
            </div>
        </div>

        <!-- Canvas dùng để xử lý ảnh ngầm (trước khi cho AI đọc) -->
        <canvas id="process-canvas" class="hidden"></canvas>

        <div class="w-full bg-white rounded-xl shadow-md p-4 flex-grow mb-4 flex flex-col">
            <div class="flex justify-between items-center border-b pb-2 mb-3">
                <h2 class="text-md font-bold text-gray-700">Trạng thái / Kết quả:</h2>
                <button id="btn-clear" class="text-xs bg-gray-200 px-3 py-1 rounded text-gray-700 hover:bg-gray-300 transition hidden">Xóa</button>
            </div>
            
            <!-- Thông báo trạng thái -->
            <div id="status-box" class="p-3 mb-3 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg text-sm">
                Sẵn sàng. Hãy chọn chức năng và mở camera.
            </div>

            <!-- Kết quả Formated -->
            <div id="result-box" class="text-sm space-y-2 hidden flex-grow">
                <p><strong>Loại giấy tờ:</strong> <span id="res-type" class="text-blue-600 font-bold uppercase"></span></p>
                <p><strong>Số/ID:</strong> <span id="res-id" class="text-red-600 font-bold text-lg"></span></p>
                <p><strong>Họ và tên:</strong> <span id="res-name" class="uppercase font-bold text-gray-900"></span></p>
                <p><strong>Ngày sinh:</strong> <span id="res-dob"></span></p>
                <p><strong>Giới tính:</strong> <span id="res-gender"></span></p>
                <p><strong>Thông tin khác:</strong> <span id="res-extra"></span></p>
            </div>

            <!-- Dữ liệu thô (Raw) để debug -->
            <div class="mt-auto pt-3 border-t">
                <p class="text-xs font-bold text-gray-500 mb-1">Dữ liệu thô thu được (Raw Data):</p>
                <div id="raw-log" class="p-2 bg-gray-100 rounded border text-xs text-gray-600 font-mono break-words max-h-[80px] overflow-y-auto">
                    ...
                </div>
            </div>
        </div>
    </main>

    <script>
        // DOM Elements
        const ui = {
            tabQr: document.getElementById('tab-qr'),
            tabMrz: document.getElementById('tab-mrz'),
            btnAction: document.getElementById('btn-action'),
            btnSnapshot: document.getElementById('btn-snapshot'),
            btnClear: document.getElementById('btn-clear'),
            qrReader: document.getElementById('qr-reader'),
            mrzVideo: document.getElementById('mrz-video'),
            mrzOverlay: document.getElementById('mrz-overlay'),
            snapshotCanvas: document.getElementById('snapshot-canvas'),
            loading: document.getElementById('loading-indicator'),
            loadingText: document.getElementById('loading-text'),
            statusBox: document.getElementById('status-box'),
            resultBox: document.getElementById('result-box'),
            rawLog: document.getElementById('raw-log')
        };

        // State
        let currentMode = 'QR';
        let isCameraRunning = false;
        let html5QrCode = null;
        let videoStream = null;
        let ocrWorker = null;

        // Chuyển Tab
        ui.tabQr.addEventListener('click', () => switchTab('QR'));
        ui.tabMrz.addEventListener('click', () => switchTab('MRZ'));

        async function switchTab(mode) {
            if (isCameraRunning) await stopCamera();
            currentMode = mode;
            clearResults();

            if (mode === 'QR') {
                ui.tabQr.classList.replace('tab-inactive', 'tab-active');
                ui.tabMrz.classList.replace('tab-active', 'tab-inactive');
                ui.btnAction.textContent = "Mở Camera Quét CCCD/VNeID";
                ui.btnSnapshot.classList.add('hidden');
                ui.qrReader.style.display = 'block';
                ui.mrzVideo.classList.add('hidden');
                ui.mrzOverlay.classList.add('hidden');
                ui.snapshotCanvas.style.display = 'none';
                updateStatus("Chế độ quét mã vạch 2D. Đưa mã QR vào khung hình.", "blue");
            } else {
                ui.tabMrz.classList.replace('tab-inactive', 'tab-active');
                ui.tabQr.classList.replace('tab-active', 'tab-inactive');
                ui.btnAction.textContent = "Mở Camera Hộ Chiếu";
                ui.btnAction.classList.remove('hidden');
                ui.qrReader.style.display = 'none';
                ui.mrzVideo.classList.remove('hidden');
                ui.mrzOverlay.classList.remove('hidden');
                ui.snapshotCanvas.style.display = 'none';
                updateStatus("Căn dòng chữ MRZ vào khung xanh rồi bấm Chụp ảnh.", "blue");
                initTesseract(); // Tải AI trước
            }
        }

        // Action Button Handler (Mở/Tắt Camera)
        ui.btnAction.addEventListener('click', async () => {
            if (isCameraRunning) {
                await stopCamera();
            } else {
                await startCamera();
            }
        });

        ui.btnClear.addEventListener('click', clearResults);

        async function startCamera() {
            clearResults();
            if (currentMode === 'QR') {
                try {
                    if (!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");
                    updateStatus("Đang mở camera QR...", "blue");
                    
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: { width: 250, height: 250 } },
                        (decodedText) => {
                            if(navigator.vibrate) navigator.vibrate(200);
                            stopCamera(); // Quét xong tự tắt camera
                            handleQRSuccess(decodedText);
                        },
                        (err) => { /* Lỗi frame rỗng, bỏ qua */ }
                    );
                    
                    isCameraRunning = true;
                    ui.btnAction.textContent = "Dừng Camera";
                    ui.btnAction.classList.replace('bg-blue-600', 'bg-red-500');
                    updateStatus("Đang quét. Hãy đưa mã QR vào khung...", "green");
                } catch (e) {
                    updateStatus("Lỗi mở camera QR: " + e, "red");
                }
            } 
            else {
                if (!ocrWorker) {
                    alert("AI đang tải, vui lòng đợi vài giây!");
                    return;
                }
                try {
                    updateStatus("Đang khởi động camera...", "blue");
                    videoStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment', width: { ideal: 1280 } } 
                    });
                    ui.mrzVideo.srcObject = videoStream;
                    ui.mrzVideo.play();
                    
                    isCameraRunning = true;
                    ui.btnAction.classList.add('hidden'); // Ẩn nút Mở camera
                    ui.btnSnapshot.classList.remove('hidden'); // Hiện nút Chụp
                    ui.btnSnapshot.textContent = "📸 Chụp & Phân tích";
                    ui.btnSnapshot.classList.replace('bg-yellow-500', 'bg-green-600');
                    ui.snapshotCanvas.style.display = 'none';
                    updateStatus("Hãy căn 2 dòng chữ dưới cùng Hộ chiếu vào khung và bấm nút Chụp.", "green");
                } catch (e) {
                    updateStatus("Lỗi mở camera Hộ chiếu: Không có quyền truy cập.", "red");
                }
            }
        }

        async function stopCamera() {
            if (currentMode === 'QR' && html5QrCode) {
                try { await html5QrCode.stop(); } catch(e){}
            } else if (currentMode === 'MRZ' && videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                ui.mrzVideo.pause();
            }
            isCameraRunning = false;
            ui.btnAction.textContent = currentMode === 'QR' ? "Mở Camera Quét CCCD" : "Mở Camera Hộ Chiếu";
            ui.btnAction.classList.remove('hidden');
            ui.btnAction.classList.replace('bg-red-500', 'bg-blue-600');
            ui.btnSnapshot.classList.add('hidden');
        }

        function handleQRSuccess(qrText) {
            ui.rawLog.textContent = qrText;
            ui.btnClear.classList.remove('hidden');
            ui.resultBox.classList.remove('hidden');

            // Phân tích định dạng CCCD Việt Nam (ngăn cách bởi dấu |)
            // Ví dụ: 001099123456|123456789|NGUYEN VAN A|01011999|Nam|Hà Nội|01012021
            const parts = qrText.split('|');
            
            if (parts.length >= 6) {
                updateStatus("✅ Đã quét thành công mã CCCD/VNeID!", "green");
                document.getElementById('res-type').textContent = "CCCD / VNeID";
                document.getElementById('res-id').textContent = parts[0];
                document.getElementById('res-name').textContent = parts[2];
                
                // Format ngày sinh ddmmyyyy -> dd/mm/yyyy
                let dob = parts[3] || "";
                if(dob.length === 8) dob = `${dob.slice(0,2)}/${dob.slice(2,4)}/${dob.slice(4,8)}`;
                
                document.getElementById('res-dob').textContent = dob;
                document.getElementById('res-gender').textContent = parts[4];
                document.getElementById('res-extra').textContent = parts[5]; // Địa chỉ
            } else {
                // Quét được QR nhưng không đúng chuẩn CCCD
                updateStatus("⚠️ Đã quét được QR, nhưng đây không phải định dạng CCCD chuẩn.", "yellow");
                document.getElementById('res-type').textContent = "MÃ QR KHÁC";
                document.getElementById('res-id').textContent = "Không xác định";
                document.getElementById('res-name').textContent = "N/A";
                document.getElementById('res-extra').textContent = "Vui lòng xem dữ liệu thô (Raw) bên dưới.";
            }
        }

        async function initTesseract() {
            if (ocrWorker) return;
            updateStatus("Đang tải AI OCR...", "blue");
            try {
                ocrWorker = await Tesseract.createWorker('eng');
                await ocrWorker.setParameters({
                    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<', // Chỉ cho phép ký tự MRZ
                });
                updateStatus("AI OCR đã sẵn sàng. Hãy mở camera.", "green");
            } catch (error) {
                updateStatus("Lỗi khởi tạo AI: " + error.message, "red");
            }
        }

        ui.btnSnapshot.addEventListener('click', async () => {
            if (!isCameraRunning) {
                // Nếu camera đang tắt (đang ở trạng thái Chụp lại), thì mở lại camera
                ui.snapshotCanvas.style.display = 'none';
                await startCamera();
                return;
            }

            if(navigator.vibrate) navigator.vibrate(50);
            
            // 1. Dừng camera (Đóng băng khung hình)
            isCameraRunning = false;
            ui.btnSnapshot.textContent = "Đang xử lý...";
            ui.btnSnapshot.classList.replace('bg-green-600', 'bg-gray-500');
            
            // 2. Chụp khung hình hiện tại lên view Canvas (Để user xem)
            const video = ui.mrzVideo;
            const snapCanvas = ui.snapshotCanvas;
            const snapCtx = snapCanvas.getContext('2d');
            snapCanvas.width = video.videoWidth;
            snapCanvas.height = video.videoHeight;
            snapCtx.drawImage(video, 0, 0, snapCanvas.width, snapCanvas.height);
            
            snapCanvas.style.display = 'block'; // Hiện ảnh chụp
            
            // Tắt stream camera gốc đi cho tiết kiệm bộ nhớ
            if (videoStream) videoStream.getTracks().forEach(track => track.stop());

            // 3. Tiền xử lý ảnh (Cắt vùng MRZ để đưa cho AI)
            showLoading(true, "AI đang đọc hình ảnh...");
            
            const procCanvas = document.getElementById('process-canvas');
            const procCtx = procCanvas.getContext('2d');
            
            // Khung guide của chúng ta nằm ở 15% dưới cùng, cao 30%. Ta cắt dư ra một chút.
            const cropY = video.videoHeight * 0.60; 
            const cropHeight = video.videoHeight * 0.40;
            procCanvas.width = video.videoWidth;
            procCanvas.height = cropHeight;
            
            // Chỉ cắt phần nửa dưới đưa vào procCanvas
            procCtx.drawImage(snapCanvas, 0, cropY, video.videoWidth, cropHeight, 0, 0, procCanvas.width, procCanvas.height);

            // Chuyển sang trắng đen cơ bản để AI đọc tốt hơn
            let imgData = procCtx.getImageData(0, 0, procCanvas.width, procCanvas.height);
            let d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let r = d[i], g = d[i+1], b = d[i+2];
                let v = 0.2126*r + 0.7152*g + 0.0722*b; // Độ sáng
                d[i] = d[i+1] = d[i+2] = v;
            }
            procCtx.putImageData(imgData, 0, 0);

            // 4. Chạy AI đọc văn bản từ ảnh đã cắt
            try {
                const { data: { text } } = await ocrWorker.recognize(procCanvas);
                
                showLoading(false);
                ui.rawLog.innerHTML = text.replace(/\n/g, '<br>');
                
                // 5. Phân tích kết quả
                if (parseMRZText(text)) {
                    updateStatus("✅ Trích xuất Hộ chiếu thành công!", "green");
                    ui.btnAction.classList.remove('hidden'); // Trả lại nút mở cam
                    ui.btnSnapshot.classList.add('hidden');
                } else {
                    updateStatus("❌ Không tìm thấy mã MRZ chuẩn. Hãy chụp lại.", "red");
                    // Chuyển nút chụp thành nút "Chụp lại"
                    ui.btnSnapshot.textContent = "🔄 Chụp lại";
                    ui.btnSnapshot.classList.replace('bg-gray-500', 'bg-yellow-500');
                }
            } catch (err) {
                showLoading(false);
                updateStatus("Lỗi AI xử lý ảnh.", "red");
            }
        });

        function parseMRZText(text) {
            // Lọc ra các dòng dài và có dấu <
            const lines = text.split('\n').map(l => l.replace(/\s/g, '').toUpperCase());
            
            // Hộ chiếu thường có 2 dòng (bắt đầu bằng P, độ dài >= 40)
            let line1 = lines.find(l => l.startsWith('P') && l.length > 35);
            let line2 = lines.find(l => l !== line1 && l.length > 35 && /[0-9]/.test(l));

            if (line1 && line2) {
                // Chuẩn hóa lỗi OCR (AI hay nhìn dấu < thành C, K, ngoặc...)
                line1 = line1.replace(/[CK\(\)\[\]\«\>]/g, '<').padEnd(44, '<').substring(0, 44);
                line2 = line2.replace(/[CK\(\)\[\]\«\>]/g, '<').padEnd(44, '<').substring(0, 44);

                try {
                    ui.resultBox.classList.remove('hidden');
                    ui.btnClear.classList.remove('hidden');

                    const nameParts = line1.substring(5).split('<<');
                    const surName = nameParts[0].replace(/</g, ' ');
                    const givenName = nameParts[1] ? nameParts[1].replace(/</g, ' ') : '';
                    
                    const passportNo = line2.substring(0, 9).replace(/</g, '');
                    const nationality = line2.substring(10, 13).replace(/</g, '');
                    const dobRaw = line2.substring(13, 19); // YYMMDD
                    const gender = line2.substring(20, 21);

                    document.getElementById('res-type').textContent = "Hộ Chiếu (Passport)";
                    document.getElementById('res-id').textContent = passportNo;
                    document.getElementById('res-name').textContent = `${surName} ${givenName}`.trim();
                    
                    // Dob format
                    let dYear = parseInt(dobRaw.substring(0,2));
                    dYear += (dYear > 30) ? 1900 : 2000;
                    document.getElementById('res-dob').textContent = `${dobRaw.substring(4,6)}/${dobRaw.substring(2,4)}/${dYear}`;
                    
                    document.getElementById('res-gender').textContent = gender === 'M' ? 'Nam' : (gender === 'F' ? 'Nữ' : 'Khác');
                    document.getElementById('res-extra').textContent = `Quốc tịch: ${nationality}`;

                    return true;
                } catch (e) {
                    return false; // Phân tích lỗi
                }
            }
            return false; // Không tìm đủ 2 dòng
        }

        function showLoading(show, text) {
            ui.loadingText.textContent = text;
            ui.loading.classList.toggle('hidden', !show);
        }

        function updateStatus(msg, color) {
            ui.statusBox.textContent = msg;
            ui.statusBox.className = `p-3 mb-3 border rounded-lg text-sm font-medium ${
                color === 'red' ? 'bg-red-50 text-red-700 border-red-200' : 
                color === 'green' ? 'bg-green-50 text-green-700 border-green-200' : 
                color === 'yellow' ? 'bg-yellow-50 text-yellow-700 border-yellow-200' : 
                'bg-blue-50 text-blue-700 border-blue-200'
            }`;
        }

        function clearResults() {
            ui.resultBox.classList.add('hidden');
            ui.btnClear.classList.add('hidden');
            ui.rawLog.innerHTML = "...";
            ['res-type', 'res-id', 'res-name', 'res-dob', 'res-gender', 'res-extra'].forEach(id => {
                document.getElementById(id).textContent = '';
            });
        }
    </script>
</body>
</html>
